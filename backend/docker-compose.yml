version: '3.8'

services:
  analytics-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-backend
    restart: unless-stopped
    ports:
      # Bind host port 51773 strictly to loopback address (127.0.0.1) for Cloudflare Tunnel security
      - "127.0.0.1:51773:51773"
    env_file:
      - .env
    environment:
      - PORT=51773
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:51773/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
